<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- viewport-fit=cover extends layout into iOS safe areas -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />

    <!-- Initial theme colors before JS loads (JS in App.jsx overrides on toggle) -->
    <meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f9fafb" media="(prefers-color-scheme: light)" />

    <!-- iOS standalone PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <!-- black-translucent = transparent status bar, app content extends behind it -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="FlowDesk" />

    <!-- Android PWA -->
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Icons (VitePWA injects <link rel="manifest"> automatically) -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/icon-512.png" />
    <link rel="canonical" href="https://go-flowdesk.vercel.app" />

    <title>FlowDesk — Your personal productivity dashboard</title>
    <meta name="description" content="Replace your scattered tabs and tools with a single, customizable workspace. Tasks, calendar, notes, focus timer, bookmarks — all connected, all in one place." />

    <!-- Open Graph (Facebook, LinkedIn, Discord, Slack, iMessage, etc.) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="FlowDesk" />
    <meta property="og:title" content="FlowDesk — Your personal productivity dashboard" />
    <meta property="og:description" content="Replace your scattered tabs and tools with a single, customizable workspace. Tasks, calendar, notes, focus timer, bookmarks — all connected, all in one place." />
    <meta property="og:image" content="https://go-flowdesk.vercel.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="FlowDesk dashboard preview" />
    <meta property="og:url" content="https://go-flowdesk.vercel.app" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter / X Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="FlowDesk — Your personal productivity dashboard" />
    <meta name="twitter:description" content="Replace your scattered tabs and tools with a single, customizable workspace. Tasks, calendar, notes, focus timer, bookmarks — all connected, all in one place." />
    <meta name="twitter:image" content="https://go-flowdesk.vercel.app/og-image.png" />
    <meta name="twitter:image:alt" content="FlowDesk dashboard preview" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
