<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>
  <!-- Subtle top shine -->
  <rect width="100" height="50" rx="22" fill="url(#shine)"/>

  <!-- "F" lettermark, clean geometric -->
  <rect x="28" y="24" width="44" height="8" rx="4" fill="white"/>
  <rect x="28" y="24" width="8" height="52" rx="4" fill="white"/>
  <rect x="28" y="46" width="34" height="8" rx="4" fill="white"/>
</svg>
